name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Lint Code
      run: npm run lint --workspaces --if-present
      
    - name: Run Backend Tests
      run: npm run test --workspace=@my-portfolio/backend --if-present
      
    - name: Run Frontend Tests
      run: npm run test --workspace=@my-portfolio/frontend --if-present
